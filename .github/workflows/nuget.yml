name: Publish to NuGet

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/ILinkBotSDK/ILinkBotSDK.csproj

      - name: Build
        run: dotnet build src/ILinkBotSDK/ILinkBotSDK.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/ILinkBotSDK/ILinkBotSDK.csproj --configuration Release --no-restore -p:PackageVersion=${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: '**/*.nupkg'

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: ./packages

      - name: Publish to NuGet
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const apiKey = '${{ secrets.NUGET_API_KEY }}';
            if (!apiKey) {
              core.setFailed('NUGET_API_KEY secret is not set');
              return;
            }

            const nupkg = fs.readdirSync('./packages').find(f => f.endsWith('.nupkg'));
            if (!nupkg) {
              core.setFailed('No .nupkg file found');
              return;
            }

            const { execSync } = require('child_process');
            try {
              execSync(`dotnet nuget push ./packages/${nupkg} --api-key ${apiKey} --source https://api.nuget.org/v3/index.json --skip-duplicate`, { stdio: 'inherit' });
              console.log('Published successfully!');
            } catch (error) {
              core.setFailed('Failed to publish to NuGet: ' + error.message);
            }